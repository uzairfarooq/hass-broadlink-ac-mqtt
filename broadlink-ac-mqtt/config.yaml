name: AC MQTT proxy for home assistant
version: 0.6.9
slug: broadlink-ac-mqtt
description: Provides AC MQTT proxy for home assistant
url: "https://github.com/uzairfarooq/hass-broadlink-ac-mqtt"
arch:
  - aarch64
  - amd64
init: false
image: "ghcr.io/uzairfarooq/{arch}-addon-broadlink-ac-mqtt"
options:
  service:
    daemon_mode: true
    update_interval: 10
    self_discovery: false
    bind_to_ip: false
    debug: false
    log_level: INFO
    log_level_console: INFO
  mqtt:
    host: addon_core_mosquitto
    port: 1883
    client_id: ac_to_mqtt
    user: koos
    passwd: koos_se_password
    topic_prefix: /aircon
    auto_discovery_topic: homeassistant
    auto_discovery_topic_retain: false
    discovery: false
  devices:
    - ip: 127.0.0.1
      mac:  aabbccddeeff00
      name: Room
      port: 80
schema:
  service:
    daemon_mode: bool
    update_interval: int
    self_discovery: bool
    bind_to_ip: bool
    debug: bool?
    log_level: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?
    log_level_console: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?
  mqtt:
    host: str
    port: port
    client_id: str
    user: str
    passwd: str
    topic_prefix: str
    auto_discovery_topic: str
    auto_discovery_topic_retain: bool
    discovery: bool
  devices:
    - ip: str
      mac:  str
      name: str
      port: port
